<svg width="900" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- AWS Cloud -->
  <rect x="220" y="12" width="240" height="38" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" fill="#633806" x="340" y="36" text-anchor="middle">AWS EC2 — ap-south-1</text>

  <!-- Arrow AWS to server -->
  <line x1="340" y1="50" x2="340" y2="72" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="11" fill="#888780" x="348" y="65">SSH key auth</text>

  <!-- RHEL 9 Server outer box -->
  <rect x="60" y="74" width="560" height="390" rx="18" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="14" font-weight="600" fill="#2C2C2A" x="150" y="100">RHEL 9 Server</text>
  <text font-size="12" fill="#5F5E5A" x="150" y="118">Amazon Linux 2023 compatible</text>

  <!-- Red Hat badge -->
  <rect x="452" y="84" width="152" height="28" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text font-size="12" font-weight="600" fill="#791F1F" x="528" y="103" text-anchor="middle">Red Hat Enterprise</text>

  <!-- Ansible banner -->
  <rect x="82" y="134" width="536" height="32" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" font-weight="600" fill="#711B13" x="350" y="155" text-anchor="middle">Ansible — automated provisioning (one command deploys all roles)</text>

  <!-- Nginx -->
  <rect x="82" y="186" width="148" height="90" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" fill="#085041" x="156" y="214" text-anchor="middle">Nginx</text>
  <text font-size="11" fill="#0F6E56" x="156" y="232" text-anchor="middle">Web server</text>
  <text font-size="11" fill="#0F6E56" x="156" y="250" text-anchor="middle">Port 80 / 443</text>
  <!-- Let's Encrypt badge -->
  <rect x="88" y="262" width="136" height="22" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text font-size="11" font-weight="600" fill="#27500A" x="156" y="277" text-anchor="middle">SSL — Let's Encrypt</text>

  <!-- PHP-FPM -->
  <rect x="246" y="186" width="130" height="74" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" fill="#3C3489" x="311" y="214" text-anchor="middle">PHP-FPM</text>
  <text font-size="11" fill="#534AB7" x="311" y="232" text-anchor="middle">Runtime</text>
  <text font-size="11" fill="#534AB7" x="311" y="250" text-anchor="middle">Port 9000</text>

  <!-- MariaDB -->
  <rect x="392" y="186" width="118" height="74" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" fill="#0C447C" x="451" y="214" text-anchor="middle">MariaDB</text>
  <text font-size="11" fill="#185FA5" x="451" y="232" text-anchor="middle">Database</text>
  <text font-size="11" fill="#185FA5" x="451" y="250" text-anchor="middle">Port 3306</text>

  <!-- OpenSSH SFTP -->
  <rect x="526" y="186" width="92" height="74" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" fill="#711B13" x="572" y="210" text-anchor="middle">SFTP</text>
  <text font-size="11" fill="#993C1D" x="572" y="228" text-anchor="middle">OpenSSH</text>
  <text font-size="11" fill="#993C1D" x="572" y="246" text-anchor="middle">Port 22</text>

  <!-- Nginx → PHP FastCGI -->
  <line x1="230" y1="226" x2="246" y2="226" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="10" fill="#534AB7" x="238" y="218" text-anchor="middle">FastCGI</text>

  <!-- PHP → MariaDB -->
  <line x1="376" y1="226" x2="392" y2="226" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="10" fill="#185FA5" x="384" y="218" text-anchor="middle">SQL</text>

  <!-- WordPress -->
  <rect x="82" y="320" width="288" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" fill="#0C447C" x="226" y="341" text-anchor="middle">WordPress</text>
  <text font-size="11" fill="#185FA5" x="226" y="361" text-anchor="middle">Deployed to /home/shibil/lemp/public/</text>

  <!-- phpMyAdmin -->
  <rect x="386" y="320" width="212" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" fill="#633806" x="492" y="341" text-anchor="middle">phpMyAdmin</text>
  <text font-size="11" fill="#854F0B" x="492" y="361" text-anchor="middle">/phpmyadmin/ — Port 80/443</text>

  <!-- Nginx → WordPress (dashed) -->
  <line x1="156" y1="284" x2="156" y2="320" stroke="#0F6E56" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- Nginx → phpMyAdmin (dashed) -->
  <line x1="492" y1="284" x2="492" y2="320" stroke="#854F0B" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- SFTP Jail note -->
  <rect x="82" y="396" width="536" height="50" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" fill="#2C2C2A" x="350" y="416" text-anchor="middle">SFTP Jail — ChrootDirectory /home/shibil</text>
  <text font-size="11" fill="#5F5E5A" x="350" y="436" text-anchor="middle">lemp/public/ read-only   |   files/ read+write   |   ForceCommand internal-sftp</text>

  <!-- SFTP block → jail note -->
  <line x1="572" y1="260" x2="572" y2="396" stroke="#993C1D" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- DuckDNS -->
  <rect x="220" y="484" width="240" height="36" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" fill="#27500A" x="340" y="507" text-anchor="middle">DuckDNS — shibilblog.duckdns.org</text>

  <!-- Server → DuckDNS -->
  <line x1="340" y1="464" x2="340" y2="484" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Browser client -->
  <rect x="82" y="560" width="200" height="70" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" fill="#085041" x="182" y="588" text-anchor="middle">Browser</text>
  <text font-size="11" fill="#0F6E56" x="182" y="607" text-anchor="middle">HTTPS visitor</text>
  <text font-size="11" fill="#0F6E56" x="182" y="623" text-anchor="middle">:443 — SSL secured</text>

  <!-- FileZilla client -->
  <rect x="398" y="560" width="200" height="70" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" fill="#711B13" x="498" y="588" text-anchor="middle">FileZilla</text>
  <text font-size="11" fill="#993C1D" x="498" y="607" text-anchor="middle">SFTP client</text>
  <text font-size="11" fill="#993C1D" x="498" y="623" text-anchor="middle">:22 — password auth</text>

  <!-- Browser → DuckDNS -->
  <line x1="182" y1="560" x2="280" y2="520" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="10" fill="#0F6E56" x="212" y="538" text-anchor="middle">HTTPS :443</text>

  <!-- FileZilla → DuckDNS -->
  <line x1="498" y1="560" x2="400" y2="520" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="10" fill="#993C1D" x="468" y="538" text-anchor="middle">SFTP :22</text>

  <!-- GitHub badge -->
  <rect x="180" y="648" width="320" height="30" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="11" fill="#444441" x="340" y="668" text-anchor="middle">github.com/Shibil-Basith/ansible-lemp</text>
</svg>
